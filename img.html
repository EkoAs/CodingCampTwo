

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
    .image-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .image-item {
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      background-color: #f9f9f9;
    }

    .image-item img {
      width: 100%;
      height: auto;
      border-radius: 4px;
    }

    .image-item p {
      margin-top: 10px;
      font-weight: bold;
      color: #333;
    }
    </style>
</head>
<body>
    <img src="image.jpg" alt="Description of image">
    <div class="image-gallery">
      <div class="image-item">
        <img src="https://picsum.photos/300/200?random=1" alt="Random image 1">
        <p>Image 1</p>
      </div>
      <div class="image-item">
        <img src="https://picsum.photos/300/200?random=2" alt="Random image 2">
        <p>Image 2</p>
      </div>
      <div class="image-item">
        <img src="https://picsum.photos/300/200?random=3" alt="Random image 3">
        <p>Image 3</p>
      </div>
      <div class="image-item">
        <img src="https://picsum.photos/300/200?random=4" alt="Random image 4">
        <p>Image 4</p>
      </div>
    </div>
</body>
</html>
</div>
