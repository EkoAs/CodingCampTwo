<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <p>Welcome</p>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="name"><i class="fas fa-user"></i> Full Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email"><i class="fas fa-envelope"></i> Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="phone"><i class="fas fa-phone"></i> Phone:</label>
            <input type="tel" id="phone" name="phone">
            
            <label for="birthdate"><i class="fas fa-calendar"></i> Date of Birth:</label>
            <input type="date" id="birthdate" name="birthdate">
            <input type="date" id="birthdate" name="birthdate">
        </fieldset>
        
        <fieldset>
            <legend>Preferences</legend>
            <label for="country"><i class="fas fa-globe"></i> Country:</label>
            <select id="country" name="country">
                <option value="">Select a country</option>
                <option value="us">United States</option>
                <option value="ca">Canada</option>
                <option value="uk">United Kingdom</option>
            </select>
            
            <label for="newsletter">
                <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                <i class="fas fa-newspaper"></i> Subscribe to newsletter
            </label>
            
            <fieldset>
                <legend><i class="fas fa-headset"></i> Contact Method</legend>
                <label>
                    <input type="radio" name="contact" value="email" checked>
                    <i class="fas fa-at"></i> Email
                </label>
                <label>
                    <input type="radio" name="contact" value="phone">
                    <i class="fas fa-phone-alt"></i> Phone
                </label>
            </fieldset>
            
            <label for="comments"><i class="fas fa-comments"></i> Comments:</label>
            <textarea id="comments" name="comments" rows="4" cols="50"></textarea>
            <textarea id="comments" name="comments" rows="4" cols="50"></textarea>
        </fieldset>
        <button type="submit"><i class="fas fa-paper-plane"></i> Submit</button>
        <button type="reset"><i class="fas fa-redo"></i> Reset</button>n>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
